<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account | YallaCode</title>
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #f4f4f4;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0; 
      }

      .register-card {
        background-color: #1c2a48;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        color: white;
        margin-top: 20px;
        margin-bottom: 20px;
        max-width: 480px; 
        margin-left: auto;
        margin-right: auto;
      }

      label {
        color: #ddd;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .form-control {
        height: 45px;
        border-radius: 5px;
        border: none;
      }

      .btn-orange {
        background-color: #F05A28;
        color: aliceblue;
        font-weight: bold;
        border-radius: 5px;
        border: none;
        font-size: 16px;
        transition: 0.3s;
        width: 100%;
        padding: 12px;
        margin-top: 10px;
       }

       .btn-orange:hover {
        background-color: #c64318;
        color: aliceblue;
       }

       .left-section img {
           width: 100%;
           height: auto;
           display: block;
           margin: 0 auto;
       }
       
       .left-section .text-center {
           padding: 20px; 
       }

       .row-flex {
           display: flex;
           align-items: center;
           flex-wrap: wrap;
           width: 100%;
       }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row row-flex"> 
        
        <div class="col-md-7 left-section hidden-xs">
            <div class="text-center">
                <img src="images/creatImage.png" alt="YallaCode Logo">
                <h3 style="color: #1c2a48; font-weight: bold; margin-top: 30px; font-size: 32px;">Join our Coding Community</h3>
                <p style="color: #555; font-size: 18px;">Create an account to start learning today!</p>
            </div>
        </div>

        <div class="col-md-5">
            
            <div class="register-card">
                <h2 class="text-center" style="margin-bottom: 5px;">Create Account</h2>
                
                
                <form action="register_process.php" method="POST" enctype="multipart/form-data">
                    
                    <div class="form-group">
                        <label for="name_id">Full Name</label>
                        <input type="text" name="fullname" class="form-control" id="name_id" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email_id">Email Address</label>
                        <input type="email" name="email" id="email_id" class="form-control" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="pass_id">Password</label>
                        <input type="password" name="password" id="pass_id" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="photo_id">Profile Photo</label>
                        <input type="file" name="photo" id="photo_id" class="form-control" style="padding-top: 10px;" required>
                        <p style="font-size: 12px; color: #aaa; margin-top: 5px;">* Required for ID verification</p>
                    </div>

                    <button type="submit" class="btn btn-orange">Sign Up</button>
                    
                    <div class="text-center" style="margin-top: 20px;">
                        <p style="color: #ccc;">Already have an account? <a href="login.html" style="color: #F05A28; text-decoration: underline; font-weight: bold;">Login</a></p>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
