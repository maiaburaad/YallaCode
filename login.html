<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | YallaCode</title>
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
      }

      .login-card {
        background-color: #1c2a48;
        
        padding: 60px 40px; 
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        color: white;
        margin-top: 20px;
        margin-bottom: 20px;
        max-width: 500px; 
        margin-left: auto;
        margin-right: auto;
        min-height: 450px; 
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      label {
        color: #ddd;
        font-weight: 600;
        margin-bottom: 10px; 
      }

      .form-group {
          margin-bottom: 25px; 
      }

      .form-control {
        height: 50px; 
        border-radius: 5px;
        border: none;
        font-size: 16px;
      }

      .btn-orange {
        background-color: #F05A28;
        color: aliceblue;
        font-weight: bold;
        border-radius: 5px;
        border: none;
        font-size: 18px;
        transition: 0.3s;
        width: 100%;
        padding: 15px;
        margin-top: 10px;
       }

       .btn-orange:hover {
        background-color: #c64318;
        color: aliceblue;
       }

       .left-section img {
           width: 100%;
           max-width: 550px; 
           height: auto;
           display: block;
           margin: 0 auto;
       }
       
       .left-section .text-center h3 {
           color: #1c2a48;
           font-weight: 800; 
           margin-top: 20px;
           font-size: 32px;
       }

       .left-section .text-center p {
           color: #666;
           font-size: 16px;
           margin-top: 10px;
       }

       .row-flex {
           display: flex;
           align-items: center;
           flex-wrap: wrap;
           width: 100%;
       }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row row-flex">
        
        <div class="col-md-7 left-section hidden-xs">
            <div class="text-center">
                <img src="images/loginImage.png" alt="YallaCode Login">
                <h3>Welcome Back!</h3>
                <p>Please login to access your account.</p>
            </div>
        </div>

        <div class="col-md-5">
            <div class="login-card">
                <h2 class="text-center" style="margin-bottom: 40px; font-weight: bold;">Login</h2>
                
                <form action="login_process.php" method="POST">
                    
                    <div class="form-group">
                        <label for="email_id">Email Address</label>
                        <input type="email" name="email" id="email_id" class="form-control" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="pass_id">Password</label>
                         <input type="password" name="password" id="pass_id" class="form-control" placeholder="•••••" required>
                    </div>

                    <button type="submit" class="btn btn-orange">Login</button>
                    
                    <div class="text-center" style="margin-top: 30px;">
                        <p style="color: #ccc;">Don't have an account? <a href="createAccount.html" style="color: #F05A28; text-decoration: underline; font-weight: bold;">Create one</a></p>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
